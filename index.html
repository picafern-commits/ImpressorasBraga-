<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<!-- 🔥 IPHONE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Impressoras Braga</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="header">Impressoras Braga</div>

<div class="container">

<!-- REGISTO -->
<div id="registo" class="card">
<h3>Registo Toners</h3>

<select id="equipamento">
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
<option>Ilha 4 - R4B1293179</option>
<option>Ilha 5 - R4B1293180</option>
<option>Balcão 1 - R4B1293183</option>
<option>Balcão 2 - R4B1293184</option>
<option>Dep.Logistica - R4B2230012</option>
<option>Grandes.Encomendas - R4B1293173</option>
<option>Devoluções - R4B1395261</option>
<option>Escritório - RVP0ZZ03770</option>
<option>Ilha1-VRL - R4B1293169</option>
<option>Ilha2-VRL - R4B1293174</option>
<option>Ilha3-VRL - RVP0Z03715</option>
</select>

<select id="cor">
<option>Preto</option>
<option>Amarelo</option>
<option>Azul</option>
<option>Vermelho</option>
</select>

<button onclick="registar()">Disponível</button>
<button onclick="abrirScanner()">📷 Scanner</button>

<div id="reader"></div>
</div>

<!-- STOCK -->
<div id="stock" class="card" style="display:none;">
<h3>Stock Toners</h3>
<input type="text" id="pesquisa" placeholder="Pesquisar..." oninput="filtrar()">
<div id="listaStock"></div>
</div>

<!-- MANUTENÇÃO -->
<div id="manutencao" class="card" style="display:none;">
<h3>Manutenção Impressoras</h3>

<select id="equipamentoM">
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacaoM">
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
<option>Ilha 4 - R4B1293179</option>
<option>Ilha 5 - R4B1293180</option>
<option>Balcão 1 - R4B1293183</option>
<option>Balcão 2 - R4B1293184</option>
<option>Dep.Logistica - R4B2230012</option>
<option>Grandes.Encomendas - R4B1293173</option>
<option>Devoluções - R4B1395261</option>
<option>Escritório - RVP0ZZ03770</option>
<option>Ilha1-VRL - R4B1293169</option>
<option>Ilha2-VRL - R4B1293174</option>
<option>Ilha3-VRL - RVP0Z03715</option>
</select>

<textarea id="descricao" placeholder="Descrição"></textarea>
<input type="date" id="data">
<button onclick="guardarManutencao()">Guardar</button>
</div>

<!-- HISTÓRICO -->
<div id="historico" class="card" style="display:none;">
<h3>Histórico Manutenções</h3>
<table>
<thead>
<tr>
<th>Equipamento</th>
<th>Local</th>
<th>Descrição</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<!-- NAVBAR -->
<div class="bottom-nav">
<button onclick="mudarPagina('registo')">Registo</button>
<button onclick="mudarPagina('stock')">Stock</button>
<button onclick="mudarPagina('manutencao')">Manutenção</button>
<button onclick="mudarPagina('historico')">Histórico</button>
</div>

<script src="script.js"></script>
</body>
</html>
