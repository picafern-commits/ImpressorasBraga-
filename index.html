<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>App Empresa</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

/* DARK */
.dark{
  background:#1c1c1e;
  color:white;
}

.container{
  padding:15px;
  padding-bottom:100px;
}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
}

.card{
  background:white;
  padding:10px;
  margin-top:10px;
}

.delete{
  background:red;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- IMPRESSORAS -->
<div id="impressoras">

<h2>Impressoras</h2>

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
</select>

<select id="cor">
<option value="">Cor</option>
<option>Preto</option>
<option>Amarelo</option>
<option>Vermelho</option>
<option>Azul</option>
</select>

<input type="date" id="data">

<button onclick="disponivel()">Disponível</button>

<h3>Stock</h3>
<div id="listaStock"></div>

<h3>Histórico</h3>
<div id="listaHistorico"></div>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">
<h2>Config</h2>

<label>
<input type="checkbox" id="darkSwitch"> Dark Mode
</label>

</div>

</div>

<nav>
<button onclick="mudarPagina('impressoras')">🖨️</button>
<button onclick="mudarPagina('config')">⚙️</button>
</nav>

<script src="app.js"></script>
</body>
</html>
