<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>App Toners</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>

/* 🔒 FIXAR APP */
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow-x:hidden;
  overflow-y:auto;
}

body{
  font-family:-apple-system;
  background:#f2f2f7;
  touch-action: pan-y;
  overscroll-behavior: none;
}

/* CONTAINER */
.container{
  padding:15px;
  padding-bottom:110px;
  max-width:100%;
  overflow-x:hidden;
}

/* DASHBOARD */
.top{
  display:flex;
  gap:10px;
}

.box{
  flex:1;
  background:white;
  padding:15px;
  border-radius:14px;
  text-align:center;
}

.big{
  font-size:24px;
  font-weight:bold;
}

/* INPUTS */
input, select, button{
  width:100%;
  max-width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
}

/* BOTÃO */
button{
  background:#007AFF;
  color:white;
}

/* CARDS */
.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  max-width:100%;
  word-wrap:break-word;
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:12px;
}

nav button{
  background:none;
  border:none;
  font-size:22px;
}

</style>
</head>

<body>

<div class="container">

<!-- IMPRESSORAS -->
<div id="impressoras">

<h2>Dashboard Toners</h2>

<div class="top">
  <div class="box">
    <div id="countStock" class="big">0</div>
    <div>Stock</div>
  </div>

  <div class="box">
    <div id="countUsados" class="big">0</div>
    <div>Usados</div>
  </div>
</div>

<input id="search" placeholder="Pesquisar por localização..." oninput="filtrar()">

<h3>Adicionar</h3>

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>
<option>Sem Localização</option>
<option>Ilha 1</option>
<option>Ilha 2</option>
<option>Ilha 3</option>
<option>Ilha 4</option>
<option>Ilha 5</option>
</select>

<select id="cor">
<option value="">Cor</option>
<option>Preto</option>
<option>Amarelo</option>
<option>Vermelho</option>
<option>Azul</option>
</select>

<input type="date" id="data">

<button onclick="disponivel()">Adicionar</button>

<h3>Stock</h3>
<div id="listaStock"></div>

<h3>Histórico</h3>
<div id="listaHistorico"></div>

</div>

<!-- COMPUTADORES -->
<div id="computadores" style="display:none">
<h2>Computadores</h2>
<p>Em construção</p>
</div>

<!-- CONFIG -->
<div id="config" style="display:none">
<h2>Configurações</h2>
<p>Em breve</p>
</div>

</div>

<!-- NAV FIXA -->
<nav>
<button onclick="mudarPagina('impressoras')">🖨️</button>
<button onclick="mudarPagina('computadores')">💻</button>
<button onclick="mudarPagina('config')">⚙️</button>
</nav>

<script src="app.js"></script>

</body>
</html>
