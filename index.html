<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<!-- 🔥 ÍCONE DA APP -->
<link rel="apple-touch-icon" href="/icon.png">
<link rel="icon" href="/icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Empresa Tech">

<meta name="theme-color" content="#000000">

<title>Empresa Tech</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
html,body{margin:0;overflow-x:hidden;}

body{
  font-family:-apple-system;
  background:#f2f2f7;
}

.dark{background:#1c1c1e;color:white;}

.container{padding:15px;padding-bottom:120px;}

.top{display:flex;gap:10px;}

.box{
  flex:1;
  background:white;
  padding:15px;
  border-radius:14px;
  text-align:center;
}

.dark .box{background:#2c2c2e;}

input,select,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
}

.dark input,.dark select{
  background:#2c2c2e;
  color:white;
}

button{
  background:#007AFF;
  color:white;
  border:none;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.dark .card{background:#2c2c2e;}

.delete{
  background:red;
  margin-top:10px;
}

/* CHECKBOX */
.checkItem{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  background:white;
  cursor:pointer;
}

.dark .checkItem{background:#2c2c2e;}

.checkItem input{width:22px;height:22px;}

.checkItem span{flex:1;}

.checkItem input:checked + span{
  color:#34C759;
  font-weight:bold;
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:12px;
}

.dark nav{background:#1c1c1e;}

nav button{
  background:none;
  border:none;
  font-size:22px;
}
</style>
</head>

<body>

<div class="container">

<!-- IMPRESSORAS -->
<div id="impressoras">

<h2>Dashboard Toners</h2>

<div class="top">
  <div class="box"><b id="countStock">0</b><br>Stock</div>
  <div class="box"><b id="countUsados">0</b><br>Usados</div>
</div>

<input id="search" placeholder="Pesquisar localização..." oninput="filtrar()">

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>
<option>Sem Localização</option>
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
<option>Ilha 4 - R4B1293179</option>
<option>Ilha 5 - R4B1293180</option>
<option>Balcão 1 - R4B1293183</option>
<option>Balcão 2 - R4B1293184</option>
<option>Dep.Logistica - R4B2230012</option>
<option>Grandes.Encomendas - R4B1293173</option>
<option>Devoluções - R4B1395261</option>
<option>Escritório - RVP0ZZ03770</option>
<option>Ilha1-VRL - R4B1293169</option>
<option>Ilha2-VRL - R4B1293174</option>
<option>Ilha3-VRL - RVP0Z03715</option>
</select>

<select id="cor">
<option value="">Cor</option>
<option>Preto</option>
<option>Amarelo</option>
<option>Vermelho</option>
<option>Azul</option>
</select>

<input type="date" id="data">

<button onclick="disponivel()">Adicionar</button>

<h3>Stock</h3>
<div id="listaStock"></div>

<h3>Histórico</h3>
<div id="listaHistorico"></div>

</div>

<!-- COMPUTADORES -->
<div id="computadores" style="display:none">

<h2>Instalação Computador</h2>

<input id="nomePC" placeholder="Nome do Computador">
<input type="date" id="dataPC">

<div id="checklist"></div>

<button onclick="guardarPC()">Guardar</button>

<h3>Histórico</h3>
<div id="listaPC"></div>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">
<h2>Configurações</h2>
<label><input type="checkbox" id="darkSwitch"> Dark Mode</label>
</div>

</div>

<nav>
<button onclick="mudarPagina('impressoras')">🖨️</button>
<button onclick="mudarPagina('computadores')">💻</button>
<button onclick="mudarPagina('config')">⚙️</button>
</nav>

<script src="app.js"></script>
</body>
</html>
