<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>App Empresa PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
html, body{ margin:0; overflow-x:hidden; }

body{
  font-family:-apple-system;
  background:#f2f2f7;
}

.dark{ background:#1c1c1e; color:white; }

.container{ padding:15px; padding-bottom:120px; }

.top{ display:flex; gap:10px; }

.box{
  flex:1;
  background:white;
  padding:15px;
  border-radius:14px;
  text-align:center;
}

.dark .box{ background:#2c2c2e; }

input,select,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
}

.dark input,.dark select{
  background:#2c2c2e;
  color:white;
}

button{
  background:#007AFF;
  color:white;
  border:none;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.dark .card{ background:#2c2c2e; }

/* CHECKBOX COMPUTADORES */
.checkItem{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  background:white;
  cursor:pointer;
}

.dark .checkItem{ background:#2c2c2e; }

.checkItem input{ width:22px; height:22px; }

.checkItem span{ flex:1; }

.checkItem input:checked + span{
  color:#34C759;
  font-weight:bold;
}

/* BOTÃO DELETE */
.delete{
  background:red;
  margin-top:10px;
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:12px;
}

.dark nav{ background:#1c1c1e; }

nav button{
  background:none;
  border:none;
  font-size:22px;
}
</style>
</head>

<body>

<div class="container">

<!-- COMPUTADORES -->
<div id="computadores">

<h2>Instalação Computador</h2>

<input id="nomePC" placeholder="Nome do Computador">

<input type="date" id="dataPC">

<div id="checklist"></div>

<button onclick="guardarPC()">Guardar</button>

<h3>Histórico</h3>
<div id="listaPC"></div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
