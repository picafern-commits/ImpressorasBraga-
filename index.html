<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>App Empresa</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f2f2f7;
}

.container{
  padding:15px;
  padding-bottom:100px;
}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
}

nav button{
  background:none;
  border:none;
  font-size:22px;
}

.active{
  color:#007AFF;
}

select,input,button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- IMPRESSORAS -->
<div id="impressoras">

<h2>Impressoras</h2>

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>

<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
<option>Ilha 4 - R4B1293179</option>
<option>Ilha 5 - R4B1293180</option>

<option>Balcão 1 - R4B1293183</option>
<option>Balcão 2 - R4B1293184</option>

<option>Dep.Logistica - R4B2230012</option>
<option>Grandes.Encomendas - R4B1293173</option>
<option>Devoluções - R4B1395261</option>

<option>Escritório - RVP0ZZ03770</option>

<option>Ilha1-VRL - R4B1293169</option>
<option>Ilha2-VRL - R4B1293174</option>
<option>Ilha3-VRL - RVP0Z03715</option>

</select>

<select id="cor">
<option value="">Cor</option>
<option>Preto</option>
<option>Amarelo</option>
<option>Vermelho</option>
<option>Azul</option>
</select>

<input type="date" id="data">

<button onclick="disponivel()">Disponível</button>

<h3>Stock</h3>
<div id="listaStock"></div>

<h3>Histórico</h3>
<div id="listaHistorico"></div>

</div>

<!-- INSTALAÇÃO -->
<div id="instalacao" style="display:none">
<h2>Instalação PC</h2>

<input id="nomePC" placeholder="Nome do Computador">

<div id="checklist"></div>

<button onclick="guardarInstalacao()">Guardar</button>

<h3>Histórico Instalações</h3>
<div id="listaPC"></div>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">
<h2>Configurações</h2>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

</div>

<nav>
<button onclick="mudarPagina('impressoras', this)">🖨️</button>
<button onclick="mudarPagina('instalacao', this)">💻</button>
<button onclick="mudarPagina('config', this)">⚙️</button>
</nav>

<script src="app.js"></script>
</body>
</html>
