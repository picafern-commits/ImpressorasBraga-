<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Toner App</title>

<!-- 🔥 BLOQUEAR ZOOM + SAFE AREA -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>

/* RESET */
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

/* BODY */
body{
  font-family:-apple-system, BlinkMacSystemFont;
  margin:0;
  background:#f2f2f7;
  overflow-x:hidden;

  /* SAFE AREA */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* DARK MODE */
.dark{
  background:#1c1c1e;
  color:white;
}

/* CONTAINER */
.container{
  padding:16px;
  padding-bottom:120px;
}

/* INPUTS */
select,input,button{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

/* DARK INPUTS */
.dark select,
.dark input{
  background:#2c2c2e;
  color:white;
  border:1px solid #444;
}

/* BUTTON */
button{
  background:#007AFF;
  color:white;
  border:none;
  font-weight:600;
}

/* CARD */
.card{
  background:white;
  padding:16px;
  border-radius:18px;
  margin-bottom:12px;
  word-wrap:break-word;
}

/* DARK CARD */
.dark .card{
  background:#2c2c2e;
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  width:100%;

  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);

  display:flex;
  justify-content:space-around;

  padding:10px;
  padding-bottom:env(safe-area-inset-bottom);

  border-top:1px solid #ddd;
}

/* DARK NAV */
.dark nav{
  background:rgba(44,44,46,0.95);
}

/* NAV BUTTON */
nav button{
  background:none;
  border:none;
  font-size:22px;
  color:#999;
}

/* ACTIVE */
nav button.active{
  color:#007AFF;
}

small{
  display:block;
  color:#666;
}

.dark small{
  color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<!-- REGISTO -->
<div id="registo">
<h2>Registo</h2>

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
</select>

<select id="cor">
<option value="">Cor</option>
<option>Preto</option>
<option>Cyan</option>
</select>

<input type="date" id="data">

<button onclick="disponivel()">Disponível</button>
</div>

<!-- STOCK -->
<div id="stock" style="display:none">
<h2>Stock</h2>
<div id="listaStock"></div>
</div>

<!-- HISTÓRICO -->
<div id="historico" style="display:none">
<h2>Histórico</h2>
<div id="listaHistorico"></div>
</div>

<!-- SETTINGS -->
<div id="settings" style="display:none">
<h2>Definições</h2>
<button onclick="toggleDark()">🌙 Modo escuro</button>
</div>

</div>

<nav>
<button onclick="mudarPagina('registo', this)">➕</button>
<button onclick="mudarPagina('stock', this)">📦</button>
<button onclick="mudarPagina('historico', this)">📜</button>
<button onclick="mudarPagina('settings', this)">⚙️</button>
</nav>

<script src="app.js"></script>

</body>
</html>
