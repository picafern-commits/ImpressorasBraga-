<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>App Empresa</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;}

body{
  font-family:-apple-system;
  margin:0;
  background:#f2f2f7;
}

.dark{
  background:#1c1c1e;
  color:white;
}

.container{
  padding:16px;
  padding-bottom:120px;
}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
}

.dark nav{
  background:#2c2c2e;
}

nav button{
  background:none;
  border:none;
  font-size:22px;
  color:#999;
}

nav button.active{
  color:#007AFF;
}

select,input,button{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ccc;
}

.dark select,
.dark input{
  background:#2c2c2e;
  color:white;
  border:1px solid #444;
}

button{
  background:#007AFF;
  color:white;
  border:none;
}

.card{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

.dark .card{
  background:#2c2c2e;
}

.check{
  display:flex;
  align-items:center;
  margin-bottom:8px;
}
.check input{
  width:auto;
  margin-right:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- IMPRESSORAS -->
<div id="impressoras">

<h2>Impressoras</h2>

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>

<option>Ilha 1</option>
<option>Ilha 2</option>
<option>Ilha 3</option>
<option>Ilha 4</option>
<option>Ilha 5</option>

<option>Balcão 1</option>
<option>Balcão 2</option>

<option>Dep.Logistica</option>
<option>Grandes.Encomendas</option>
<option>Devoluções</option>

<option>Escritório</option>

<option>Ilha1 VRL</option>
<option>Ilha2 VRL</option>
<option>Ilha3 VRL</option>

</select>

<select id="cor">
<option value="">Cor</option>
<option>Preto</option>
<option>Amarelo</option>
<option>Vermelho</option>
<option>Azul</option>
</select>

<input type="date" id="data">

<button onclick="disponivel()">Disponível</button>

<h3>Stock</h3>
<div id="listaStock"></div>

<h3>Histórico</h3>
<div id="listaHistorico"></div>

</div>

<!-- INSTALAÇÃO -->
<div id="instalacao" style="display:none">

<h2>Instalação PC</h2>

<input id="nomePC" placeholder="Nome do Computador">

<div id="checklist"></div>

<button onclick="guardarInstalacao()">Guardar</button>

<h3>Histórico Instalações</h3>
<div id="listaPC"></div>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">

<h2>Configurações</h2>

<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

</div>

<nav>
<button onclick="mudarPagina('impressoras', this)">🖨️</button>
<button onclick="mudarPagina('instalacao', this)">💻</button>
<button onclick="mudarPagina('config', this)">⚙️</button>
</nav>

<script src="app.js"></script>

</body>
</html>
