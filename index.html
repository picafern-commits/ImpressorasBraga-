<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Dashboard Empresa</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

.dark{
  background:#1c1c1e;
  color:white;
}

.container{
  padding:15px;
  padding-bottom:120px;
}

/* DASHBOARD */
.top{
  display:flex;
  gap:10px;
}

.box{
  flex:1;
  padding:15px;
  border-radius:15px;
  text-align:center;
  background:white;
}

.dark .box{ background:#2c2c2e; }

.big{
  font-size:24px;
  font-weight:bold;
}

input,select,button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
}

button{
  background:#007AFF;
  color:white;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  transition:0.2s;
}

.card:active{
  transform:scale(0.97);
}

.dark .card{
  background:#2c2c2e;
}

.delete{
  background:red;
  margin-top:10px;
}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

nav button{
  background:none;
  border:none;
  font-size:22px;
}
</style>
</head>

<body>

<div class="container">

<!-- DASHBOARD -->
<div id="impressoras">

<h2>Dashboard Toners</h2>

<div class="top">
  <div class="box">
    <div id="countStock" class="big">0</div>
    <div>Stock</div>
  </div>

  <div class="box">
    <div id="countUsados" class="big">0</div>
    <div>Usados</div>
  </div>
</div>

<input id="search" placeholder="Pesquisar ID..." oninput="filtrar()">

<h3>Adicionar</h3>

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>
<option>Sem Localização</option>
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
<option>Ilha 4 - R4B1293179</option>
<option>Ilha 5 - R4B1293180</option>
<option>Balcão 1 - R4B1293183</option>
<option>Balcão 2 - R4B1293184</option>
<option>Dep.Logistica - R4B2230012</option>
<option>Grandes.Encomendas - R4B1293173</option>
<option>Devoluções - R4B1395261</option>
<option>Escritório - RVP0ZZ03770</option>
<option>Ilha1-VRL - R4B1293169</option>
<option>Ilha2-VRL - R4B1293174</option>
<option>Ilha3-VRL - RVP0Z03715</option>
</select>

<select id="cor">
<option value="">Cor</option>
<option>Preto</option>
<option>Amarelo</option>
<option>Vermelho</option>
<option>Azul</option>
</select>

<input type="date" id="data">
<button onclick="disponivel()">Adicionar</button>

<h3>Stock</h3>
<div id="listaStock"></div>

<h3>Histórico</h3>
<div id="listaHistorico"></div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
