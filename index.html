<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toner Manager</title>

<link rel="stylesheet" href="style.css">

<!-- SCANNER -->
<script src="https://unpkg.com/html5-qrcode"></script>

</head>
<body>

<div class="header">
Toner Manager
<button onclick="toggleDark()" style="float:right;">🌙</button>
</div>

<div class="container">

<!-- PAGINA 1 -->
<div id="registo" class="card">

<h3>Registo Toners</h3>

<select id="equipamento">
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option>Ilha 1</option>
<option>Ilha 2</option>
<option>Ilha 3</option>
<option>Ilha 4</option>
<option>Ilha 5</option>
<option>Balcão 1</option>
<option>Balcão 2</option>
<option>Dep.Logistica</option>
<option>Grandes.Encomendas</option>
<option>Devoluções</option>
<option>Escritório</option>
<option>Ilha1 VRL</option>
<option>Ilha2 VRL</option>
<option>Ilha3 VRL</option>
</select>

<select id="cor">
<option>Preto</option>
<option>Amarelo</option>
<option>Azul</option>
<option>Vermelho</option>
</select>

<button onclick="registarToner()">Disponível</button>

<button onclick="abrirScanner()">📷 Scanner</button>
<div id="reader"></div>

</div>

<!-- PAGINA 2 -->
<div id="stock" class="card" style="display:none;">
<h3>Stock Toners</h3>

<input type="text" id="pesquisa" placeholder="Pesquisar..." oninput="filtrarStock()">

<div id="listaStock"></div>
</div>

<!-- PAGINA 3 -->
<div id="manutencao" class="card" style="display:none;">
<h3>Manutenção Impressoras</h3>

<select id="equipamentoM">
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacaoM">
<option>Ilha 1</option>
<option>Ilha 2</option>
<option>Ilha 3</option>
<option>Ilha 4</option>
<option>Ilha 5</option>
<option>Balcão 1</option>
<option>Balcão 2</option>
<option>Dep.Logistica</option>
<option>Grandes.Encomendas</option>
<option>Devoluções</option>
<option>Escritório</option>
<option>Ilha1 VRL</option>
<option>Ilha2 VRL</option>
<option>Ilha3 VRL</option>
</select>

<textarea id="descricaoM" placeholder="Descrição"></textarea>
<input type="date" id="dataM">

<button onclick="guardarManutencao()">Guardar</button>

</div>

<!-- PAGINA 4 -->
<div id="historico" class="card" style="display:none;">
<h3>Histórico Manutenções</h3>

<table border="1" width="100%">
<thead>
<tr>
<th>Equipamento</th>
<th>Local</th>
<th>Descrição</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabelaManutencao"></tbody>
</table>

</div>

</div>

<!-- MENU -->
<div class="bottom-nav">
<a onclick="mudarPagina('registo')">Registo</a>
<a onclick="mudarPagina('stock')">Stock</a>
<a onclick="mudarPagina('manutencao')">Manutenção</a>
<a onclick="mudarPagina('historico')">Histórico</a>
</div>

<script src="script.js"></script>

</body>
</html>
