<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>App Empresa</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
  overflow-x:hidden;
}

.dark{
  background:#1c1c1e;
  color:white;
}

.container{
  padding:15px;
  padding-bottom:120px;
}

/* DASHBOARD */
.top{
  display:flex;
  gap:10px;
}

.box{
  flex:1;
  padding:15px;
  border-radius:15px;
  text-align:center;
  background:white;
}

.dark .box{ background:#2c2c2e; }

.big{
  font-size:24px;
  font-weight:bold;
}

input,select,button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
}

button{
  background:#007AFF;
  color:white;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.dark .card{
  background:#2c2c2e;
}

.delete{
  background:red;
  margin-top:10px;
}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

nav button{
  background:none;
  border:none;
  font-size:22px;
}
</style>
</head>

<body>

<div class="container">

<!-- IMPRESSORAS -->
<div id="impressoras">

<h2>Dashboard Toners</h2>

<div class="top">
  <div class="box">
    <div id="countStock" class="big">0</div>
    <div>Stock</div>
  </div>

  <div class="box">
    <div id="countUsados" class="big">0</div>
    <div>Usados</div>
  </div>
</div>

<input id="search" placeholder="Pesquisar por localização..." oninput="filtrar()">

<h3>Adicionar</h3>

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>
<option>Sem Localização</option>
<option>Ilha 1 - R4B2229805</option
